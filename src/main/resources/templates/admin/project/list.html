<!doctype html>
<html
  th:lang="|${#locale.language}-${#locale.country}|"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{admin/layout/main}"
>
  <head>
    <title>Projects - Admin Panel</title>
  </head>

  <body>
    <th:block layout:fragment="content">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold">Projects</h2>
          <p
            class="text-sm text-light-fg-secondary dark:text-dark-fg-secondary mt-1 transition-colors duration-300"
          >
            Manage all your portfolio projects
          </p>
        </div>
        <a
          th:href="@{/admin/projects/new}"
          class="inline-flex items-center gap-2 px-4 py-2.5 bg-accent text-white text-sm font-semibold rounded-lg hover:opacity-90 transition-opacity duration-200"
        >
          <ion-icon name="add-outline" class="text-lg"></ion-icon>
          New Project
        </a>
      </div>

      <div class="mb-6 space-y-3">
        <th:block
          th:replace="~{admin/fragments/alerts :: alert('error',
            ${errorMessage} != null ? ${errorMessage} : null
          )}"
        ></th:block>
        <th:block
          th:replace="~{admin/fragments/alerts :: alert('success',
            ${deletedProjectName} != null
              ? 'Project &quot;' + ${deletedProjectName} + '&quot; has been deleted.'
              : null
          )}"
        ></th:block>
      </div>

      <div
        class="bg-light-bg-primary dark:bg-dark-bg-primary rounded-xl shadow-sm border border-light-border dark:border-dark-border overflow-hidden transition-colors duration-300"
      >
        <div
          th:replace="~{admin/fragments/tables :: table-header-bar(${projects}, 'projects')}"
        ></div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr
                class="bg-light-action-secondary dark:bg-dark-action-secondary transition-colors duration-300"
              >
                <th
                  th:replace="~{admin/fragments/tables :: table-th('#', 'w-12')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Name', '')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Tags', 'hidden lg:table-cell')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Status', 'hidden md:table-cell')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Actions', 'text-right')}"
                ></th>
              </tr>
            </thead>
            <tbody>
              <th:block th:if="${projects.isEmpty()}">
                <tr
                  th:replace="~{admin/fragments/tables :: table-empty-row(
                    5,
                    'code-slash-outline',
                    'No projects yet',
                    @{/admin/projects/new},
                    'Create your first project'
                  )}"
                ></tr>
              </th:block>

              <tr
                th:each="project, iter : ${projects}"
                class="border-t border-light-border dark:border-dark-border hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary transition-colors duration-200"
              >
                <td
                  class="px-6 py-4 text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300"
                  th:text="${projects.number * projects.size + iter.count}"
                >
                  1
                </td>

                <td class="px-6 py-4">
                  <div class="flex items-center gap-3">
                    <img
                      th:if="${project.imagePreview != null and !project.imagePreview.asString().isEmpty()}"
                      th:src="${project.imagePreview.asString()}"
                      alt="Preview"
                      class="w-10 h-10 rounded-lg object-cover flex-shrink-0 hidden sm:block"
                    />
                    <div
                      th:unless="${project.imagePreview != null and !project.imagePreview.asString().isEmpty()}"
                      class="w-10 h-10 rounded-lg bg-light-action-secondary dark:bg-dark-action-secondary flex items-center justify-center flex-shrink-0 hidden sm:flex transition-colors duration-300"
                    >
                      <ion-icon
                        name="image-outline"
                        class="text-light-fg-tertiary dark:text-dark-fg-tertiary text-lg"
                      ></ion-icon>
                    </div>
                    <div>
                      <p
                        class="font-medium text-light-fg-primary dark:text-dark-fg-primary line-clamp-1 transition-colors duration-300"
                        th:text="${project.projectName.asString()}"
                      >
                        Project Name
                      </p>
                      <p
                        class="text-xs text-light-fg-tertiary dark:text-dark-fg-tertiary line-clamp-1 mt-0.5 transition-colors duration-300"
                        th:text="${project.projectSlug.asString()}"
                      >
                        project-slug
                      </p>
                    </div>
                  </div>
                </td>

                <td class="px-6 py-4 hidden lg:table-cell">
                  <div class="flex flex-wrap gap-1">
                    <span
                      th:each="tag : ${project.tags}"
                      class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-accent/10 text-accent"
                      th:text="${tag.tagName.asString()}"
                      >Tag</span
                    >
                  </div>
                </td>

                <td class="px-6 py-4 hidden md:table-cell">
                  <span
                    th:text="${project.contentStatus.name()}"
                    th:classappend="${project.contentStatus.name() == 'PUBLISHED'}
      ? 'bg-green-100 text-green-700 dark:bg-green-500/10 dark:text-green-400'
      : 'bg-yellow-100 text-yellow-700 dark:bg-yellow-500/10 dark:text-yellow-400'"
                    class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium"
                  >
                    DRAFT
                  </span>
                </td>

                <td class="px-6 py-4">
                  <div class="flex items-center justify-end gap-2">
                    <a
                      th:replace="~{admin/fragments/tables :: table-action-view(
                      @{/projects/{slug}(slug=${project.projectSlug.asString()})}
                    )}"
                    ></a>
                    <form
                      th:replace="~{admin/fragments/tables :: table-action-publish(
                      @{/admin/projects/{id}/publish(id=${project.id.asString()})},
                      'Are you sure you want to publish this project?'
                    )}"
                    ></form>
                    <a
                      th:replace="~{admin/fragments/tables :: table-action-edit(
                      @{/admin/projects/{id}/update(id=${project.id.asString()})}
                    )}"
                    ></a>
                    <form
                      th:replace="~{admin/fragments/tables :: table-action-delete(
                      @{/admin/projects/{id}/delete(id=${project.id.asString()})},
                      'Are you sure you want to delete this project?'
                    )}"
                    ></form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          th:replace="~{admin/fragments/paginations :: pagination(${projects}, '/admin/projects')}"
        ></div>
      </div>
    </th:block>
  </body>
</html>
