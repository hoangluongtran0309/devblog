<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <span
      th:fragment="grid-header-bar(page, itemLabel)"
      class="text-sm text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
    >
      Total:
      <span
        class="font-semibold text-light-fg-primary dark:text-dark-fg-primary"
        th:text="${page.totalElements}"
        >0</span
      >
      <span th:text="${itemLabel}">items</span>
    </span>

    <a
      th:fragment="grid-filter-tab(label, href, isActive)"
      th:href="${href}"
      th:classappend="${isActive}
        ? 'bg-light-bg-primary dark:bg-dark-bg-primary
           text-light-fg-primary dark:text-dark-fg-primary shadow-sm'
        : 'text-light-fg-secondary dark:text-dark-fg-secondary hover:text-accent'"
      class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200"
      th:text="${label}"
      >Tab</a
    >

    <div
      th:fragment="grid-empty-state(icon, message, sub)"
      class="col-span-full py-24 flex flex-col items-center gap-4 text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300"
    >
      <div
        class="w-20 h-20 rounded-2xl bg-light-action-secondary dark:bg-dark-action-secondary flex items-center justify-center transition-colors duration-300"
      >
        <ion-icon th:name="${icon}" class="text-4xl"></ion-icon>
      </div>
      <div class="text-center space-y-1">
        <p
          class="font-medium text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
          th:text="${message}"
        >
          No items yet
        </p>
        <p
          th:if="${sub}"
          class="text-sm transition-colors duration-300"
          th:text="${sub}"
        ></p>
      </div>
    </div>

    <button
      th:fragment="grid-card-action-copy(url)"
      type="button"
      th:attr="data-copy-url=${url}"
      onclick="copyToClipboard(this.dataset.copyUrl, this)"
      title="Copy URL"
      class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/90 dark:bg-dark-bg-primary/90 text-light-fg-secondary dark:text-dark-fg-secondary hover:text-accent shadow-sm transition-all duration-200"
    >
      <ion-icon name="copy-outline" class="text-base"></ion-icon>
    </button>

    <a
      th:fragment="grid-card-action-open(url)"
      th:href="${url}"
      target="_blank"
      rel="noopener noreferrer"
      title="Open"
      class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/90 dark:bg-dark-bg-primary/90 text-light-fg-secondary dark:text-dark-fg-secondary hover:text-accent shadow-sm transition-all duration-200"
    >
      <ion-icon name="open-outline" class="text-base"></ion-icon>
    </a>

    <a
      th:fragment="grid-card-action-view(url)"
      th:href="${url}"
      title="View"
      class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/90 dark:bg-dark-bg-primary/90 text-light-fg-secondary dark:text-dark-fg-secondary hover:text-accent shadow-sm transition-all duration-200"
    >
      <ion-icon name="eye-outline" class="text-base"></ion-icon>
    </a>

    <a
      th:fragment="grid-card-action-edit(url)"
      th:href="${url}"
      title="Edit"
      class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/90 dark:bg-dark-bg-primary/90 text-light-fg-secondary dark:text-dark-fg-secondary hover:text-accent shadow-sm transition-all duration-200"
    >
      <ion-icon name="create-outline" class="text-base"></ion-icon>
    </a>

    <form
      th:fragment="grid-card-action-delete(url, confirmMsg)"
      th:action="${url}"
      method="post"
      th:data-confirm="${confirmMsg ?: 'Are you sure you want to delete this item?'}"
      onsubmit="return confirm(this.dataset.confirm);"
    >
      <button
        type="submit"
        title="Delete"
        class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/90 dark:bg-dark-bg-primary/90 text-light-fg-secondary dark:text-dark-fg-secondary hover:text-red-500 transition-all duration-200"
      >
        <ion-icon name="trash-outline" class="text-base"></ion-icon>
      </button>
    </form>
  </body>
</html>
