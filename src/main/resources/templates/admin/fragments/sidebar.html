<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="sidebar">
      <aside
        class="admin-sidebar fixed inset-0 lg:left-0 lg:top-0 lg:w-64 lg:h-full bg-light-bg-primary dark:bg-dark-bg-primary shadow-lg z-40 transform -translate-x-full lg:translate-x-0 transition-all duration-300 overflow-auto"
      >
        <div class="p-6">
          <div class="flex items-center justify-between mb-8">
            <div class="w-full lg:w-auto text-center lg:text-left mb-8 lg:mb-0">
              <a th:href="@{/}">
                <img
                  th:src="@{/svg/logo-light.svg}"
                  width="150"
                  height="40"
                  class="logo-light dark:hidden"
                />
                <img
                  th:src="@{/svg/logo-dark.svg}"
                  width="150"
                  height="40"
                  class="logo-dark hidden dark:block"
                />
              </a>

              <h1
                class="text-3xl font-bold text-accent mb-2 mt-4 transition-colors duration-300"
              >
                Admin Panel
              </h1>
            </div>
            <button
              class="admin-sidebar-close-btn lg:hidden absolute top-5 right-5 w-10 h-10 flex justify-center items-center bg-light-action-secondary dark:bg-dark-action-secondary text-light-fg-tertiary dark:text-dark-fg-tertiary rounded-full text-2xl hover:bg-accent hover:text-white transition-all"
            >
              <ion-icon name="close-outline"></ion-icon>
            </button>
          </div>

          <nav>
            <ul class="space-y-2">
              <li>
                <a
                  th:href="@{/admin/dashboard}"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon
                    name="grid-outline"
                    class="text-xl transition-colors duration-300"
                  ></ion-icon>
                  <span class="transition-colors duration-300">Dashboard</span>
                </a>
              </li>

              <li>
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon
                    name="newspaper-outline"
                    class="text-xl transition-colors duration-300"
                  ></ion-icon>
                  <span class="transition-colors duration-300">Articles</span>
                </a>
              </li>

              <li>
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon
                    name="code-slash-outline"
                    class="text-xl"
                  ></ion-icon>
                  <span>Projects</span>
                </a>
              </li>

              <li>
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon
                    name="pricetags-outline"
                    class="text-xl transition-colors duration-300"
                  ></ion-icon>
                  <span class="transition-colors duration-300">Tags</span>
                </a>
              </li>

              <li>
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon name="folder-outline" class="text-xl"></ion-icon>
                  <span>Categories</span>
                </a>
              </li>

              <li>
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon
                    name="mail-outline"
                    class="text-xl transition-colors duration-300"
                  ></ion-icon>
                  <span class="transition-colors duration-300">Contacts</span>
                </a>
              </li>

              <li>
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
                >
                  <ion-icon
                    name="images-outline"
                    class="text-xl transition-colors duration-300"
                  ></ion-icon>
                  <span class="transition-colors duration-300">Media</span>
                </a>
              </li>
            </ul>
          </nav>

          <div
            class="mt-8 pt-6 border-t border-light-action-primary dark:border-dark-action-primary transition-colors duration-300"
          >
            <a
              href="#"
              rel="noopener noreferrer"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
            >
              <ion-icon
                name="settings-outline"
                class="text-xl transition-colors duration-300"
              ></ion-icon>
              <span class="transition-colors duration-300"> Settings </span>
            </a>

            <a
              th:href="@{/}"
              target="_blank"
              rel="noopener noreferrer"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-colors duration-300"
            >
              <ion-icon
                name="eye-outline"
                class="text-xl transition-colors duration-300"
              ></ion-icon>
              <span class="transition-colors duration-300"> View Website </span>
            </a>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
