<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="text-field(id, name, labelKey, labelDefault, icon, placeholder, required, autocomplete, value, errorField, extraClasses)"
    >
      <th:block
        th:with="hasError=${errorField != null and #fields.hasErrors(errorField)}"
      >
        <div>
          <label
            th:for="${id}"
            class="block text-sm font-medium mb-2 transition-colors duration-300"
          >
            <span
              th:if="${labelKey != null}"
              th:text="#{${labelKey}} ?: ${labelDefault}"
              >Label</span
            >
            <span th:unless="${labelKey != null}" th:text="${labelDefault}"
              >Label</span
            >
            <span th:if="${required}" class="text-red-500 ml-0.5">*</span>
          </label>

          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <ion-icon
                th:name="${icon}"
                th:class="${hasError}
                  ? 'text-xl text-red-400 transition-colors duration-300'
                  : 'text-xl text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300'"
              ></ion-icon>
            </div>

            <input
              type="text"
              th:id="${id}"
              th:name="${name}"
              th:required="${required}"
              th:autocomplete="${autocomplete} ?: 'off'"
              th:value="${value}"
              th:placeholder="${placeholder}"
              th:classappend="${extraClasses}"
              th:class="${hasError}
                ? 'w-full pl-10 pr-10 py-3 bg-red-50 dark:bg-red-900/10 border border-red-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 transition-all duration-300'
                : 'w-full pl-10 pr-4 py-3 bg-light-action-secondary dark:bg-dark-action-secondary rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-all duration-300'"
            />

            <div
              th:if="${hasError}"
              class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"
            >
              <ion-icon
                name="alert-circle-outline"
                class="text-xl text-red-500"
              ></ion-icon>
            </div>
          </div>

          <div th:if="${hasError}" class="flex items-center gap-1.5 mt-1.5">
            <ion-icon
              name="information-circle-outline"
              class="text-sm text-red-500 shrink-0"
            ></ion-icon>
            <p
              th:errors="*{__${errorField}__}"
              class="text-xs text-red-500"
            ></p>
          </div>
        </div>
      </th:block>
    </div>

    <div
      th:fragment="password-field(id, name, labelKey, labelDefault, placeholder, required, autocomplete, minlength, errorField, extraClasses)"
    >
      <th:block
        th:with="hasError=${errorField != null and #fields.hasErrors(errorField)}"
      >
        <div>
          <label
            th:for="${id}"
            class="block text-sm font-medium mb-2 transition-colors duration-300"
          >
            <span
              th:if="${labelKey != null}"
              th:text="#{${labelKey}} ?: ${labelDefault}"
              >Label</span
            >
            <span th:unless="${labelKey != null}" th:text="${labelDefault}"
              >Label</span
            >
            <span th:if="${required}" class="text-red-500 ml-0.5">*</span>
          </label>

          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <ion-icon
                name="lock-closed-outline"
                th:class="${hasError}
                  ? 'text-xl text-red-400 transition-colors duration-300'
                  : 'text-xl text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300'"
              ></ion-icon>
            </div>

            <input
              type="password"
              th:id="${id}"
              th:name="${name}"
              th:required="${required}"
              th:autocomplete="${autocomplete} ?: 'off'"
              th:minlength="${minlength}"
              th:placeholder="${placeholder} ?: '••••••••'"
              th:classappend="${extraClasses}"
              th:class="${hasError}
                ? 'w-full pl-10 pr-20 py-3 bg-red-50 dark:bg-red-900/10 border border-red-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 transition-all duration-300'
                : 'w-full pl-10 pr-12 py-3 bg-light-action-secondary dark:bg-dark-action-secondary rounded-lg focus:outline-none focus:ring-2 focus:ring-accent transition-all duration-300'"
            />

            <div
              class="absolute inset-y-0 right-0 flex items-center pr-3 gap-1.5"
            >
              <ion-icon
                th:if="${hasError}"
                name="alert-circle-outline"
                class="text-xl text-red-500 pointer-events-none"
              ></ion-icon>

              <button
                type="button"
                th:attr="data-target-id=${id}"
                onclick="togglePassword(this.dataset.targetId, this)"
                class="flex items-center text-light-fg-tertiary dark:text-dark-fg-tertiary hover:text-accent transition-colors duration-300"
              >
                <ion-icon
                  name="eye-outline"
                  class="text-xl eye-icon"
                ></ion-icon>
                <ion-icon
                  name="eye-off-outline"
                  class="text-xl eye-off-icon hidden"
                ></ion-icon>
              </button>
            </div>
          </div>

          <div th:if="${hasError}" class="flex items-center gap-1.5 mt-1.5">
            <ion-icon
              name="information-circle-outline"
              class="text-sm text-red-500 shrink-0"
            ></ion-icon>
            <p
              th:errors="*{__${errorField}__}"
              class="text-xs text-red-500"
            ></p>
          </div>
        </div>
      </th:block>
    </div>

    <div
      th:fragment="ck-editor-field(id, name, labelDefault, required, value, errorField)"
    >
      <th:block
        th:with="hasError=${errorField != null and #fields.hasErrors(errorField)}"
      >
        <div>
          <label
            th:for="${id}"
            class="block text-sm font-medium mb-2 transition-colors duration-300"
          >
            <span th:text="${labelDefault}">Label</span>
            <span th:if="${required}" class="text-red-500 ml-0.5">*</span>
          </label>

          <textarea
            th:id="${id}"
            th:name="${name}"
            th:text="${value}"
            style="display: none"
          ></textarea>

          <div
            th:id="${id + 'Editor'}"
            th:class="${hasError}
              ? 'border border-red-400 rounded-lg'
              : 'border border-light-border dark:border-dark-border rounded-lg'"
          ></div>

          <div th:if="${hasError}" class="flex items-center gap-1.5 mt-1.5">
            <ion-icon
              name="information-circle-outline"
              class="text-sm text-red-500 shrink-0"
            ></ion-icon>
            <p
              th:errors="*{__${errorField}__}"
              class="text-xs text-red-500"
            ></p>
          </div>
        </div>
      </th:block>
    </div>

    <div
      th:fragment="image-picker-field(id, name, labelDefault, required, value, errorField)"
    >
      <th:block
        th:with="hasError=${errorField != null and #fields.hasErrors(errorField)},
                 hasValue=${value != null and !#strings.isEmpty(value)}"
      >
        <div>
          <label
            th:for="${id}"
            class="block text-sm font-medium mb-2 transition-colors duration-300"
          >
            <span th:text="${labelDefault}">Image</span>
            <span th:if="${required}" class="text-red-500 ml-0.5">*</span>
          </label>

          <input
            type="hidden"
            th:id="${id}"
            th:name="${name}"
            th:value="${value}"
          />

          <div
            th:classappend="${hasError}
              ? 'border-2 border-red-400 bg-red-50 dark:bg-red-900/10'
              : 'border-2 border-light-border dark:border-dark-border bg-light-action-secondary dark:bg-dark-action-secondary'"
            class="relative rounded-xl overflow-hidden transition-colors duration-300"
          >
            <div
              th:id="${id + 'Filled'}"
              th:class="${hasValue} ? 'block' : 'hidden'"
            >
              <img
                th:id="${id + 'Img'}"
                th:src="${hasValue} ? ${value} : ''"
                alt="Selected image"
                class="w-full h-48 object-cover"
              />

              <div
                class="absolute bottom-0 inset-x-0 flex items-center justify-between gap-2 px-3 py-2 bg-black/50 backdrop-blur-sm"
              >
                <p
                  th:id="${id + 'Name'}"
                  class="text-white text-xs font-medium truncate"
                  th:text="${hasValue} ? ${#strings.substringAfterLast(value, '/')} : ''"
                ></p>
                <button
                  type="button"
                  th:attr="onclick='clearPickerField(\'' + ${id} + '\')'"
                  class="flex-shrink-0 w-6 h-6 flex items-center justify-center rounded-full bg-white/20 hover:bg-red-500 text-white transition-colors duration-200"
                  title="Remove"
                  aria-label="Remove selected image"
                >
                  <ion-icon name="close-outline" class="text-sm"></ion-icon>
                </button>
              </div>
            </div>

            <div
              th:id="${id + 'Empty'}"
              th:classappend="${hasValue} ? ' hidden' : ' flex'"
              class="flex-col items-center justify-center text-center gap-2 py-10 text-light-fg-secondary dark:text-dark-fg-secondary"
            >
              <ion-icon
                name="image-outline"
                class="text-3xl text-current"
              ></ion-icon>

              <p class="text-sm">No image selected</p>
            </div>
          </div>

          <button
            type="button"
            th:attr="onclick='openMediaPicker(\'mediaPickerModal\', \'' + ${id} + '\')'"
            class="mt-2.5 w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg text-sm font-medium border border-light-border dark:border-dark-border bg-light-bg-primary dark:bg-dark-bg-primary text-light-fg-secondary dark:text-dark-fg-secondary hover:border-accent hover:text-accent transition-all duration-200"
          >
            <ion-icon name="images-outline" class="text-base"></ion-icon>
            Choose from Media Library
          </button>

          <div th:if="${hasError}" class="flex items-center gap-1.5 mt-1.5">
            <ion-icon
              name="information-circle-outline"
              class="text-sm text-red-500 shrink-0"
            ></ion-icon>
            <p
              th:errors="*{__${errorField}__}"
              class="text-xs text-red-500"
            ></p>
          </div>
        </div>
      </th:block>
    </div>

    <th:block th:fragment="field-js">
      <script th:inline="javascript">
        "use strict";
        function togglePassword(fieldId, btn) {
          const input = document.getElementById(fieldId);
          if (!input) return;
          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";
          btn.querySelector(".eye-icon").classList.toggle("hidden", isPassword);
          btn
            .querySelector(".eye-off-icon")
            .classList.toggle("hidden", !isPassword);
        }
      </script>
    </th:block>

    <th:block th:fragment="ck-editor-js(fieldId)">
      <script th:inline="javascript">
        "use strict";
        (function () {
          const textareaId = /*[[${fieldId}]]*/ "";
          const editorId = textareaId + "Editor";

          const textarea = document.getElementById(textareaId);
          const mountEl = document.getElementById(editorId);

          if (!textarea || !mountEl) {
            console.warn(
              "CKEditor: không tìm thấy #" + textareaId + " hoặc #" + editorId,
            );
            return;
          }

          if (typeof CKEDITOR_VERSION === "undefined") {
            console.error(
              "CKEditor: chưa được load. Kiểm tra CDN trong layout.",
            );
            return;
          }

          CKEDITOR.ClassicEditor.create(mountEl, {
            initialData: textarea.value,
            removePlugins: [
              "AIAssistant",
              "RealTimeCollaborativeComments",
              "RealTimeCollaborativeTrackChanges",
              "RealTimeCollaborativeRevisionHistory",
              "PresenceList",
              "Comments",
              "TrackChanges",
              "TrackChangesData",
              "RevisionHistory",
              "CKBox",
              "CKFinder",
              "EasyImage",
              "DocumentOutline",
              "TableOfContents",
              "Pagination",
              "MultiLevelList",
              "FormatPainter",
              "Template",
              "SlashCommand",
              "PasteFromOfficeEnhanced",
              "CaseChange",
              "WProofreader",
              "MathType",
              "ImageInsert",
              "ImageUpload",
              "Base64UploadAdapter",
            ],
            toolbar: {
              items: [
                "undo",
                "redo",
                "|",
                "heading",
                "|",
                "bold",
                "italic",
                "underline",
                "strikethrough",
                "|",
                "fontFamily",
                "fontSize",
                "fontColor",
                "fontBackgroundColor",
                "|",
                "alignment",
                "|",
                "bulletedList",
                "numberedList",
                "outdent",
                "indent",
                "|",
                "link",
                "blockQuote",
                "code",
                "codeBlock",
                "|",
                "imageInsertViaUrl",
                "insertTable",
                "mediaEmbed",
                "horizontalLine",
                "|",
                "subscript",
                "superscript",
                "removeFormat",
              ],
              shouldNotGroupWhenFull: false,
            },
            heading: {
              options: [
                {
                  model: "paragraph",
                  title: "Paragraph",
                  class: "ck-heading_paragraph",
                },
                {
                  model: "heading1",
                  view: "h1",
                  title: "Heading 1",
                  class: "ck-heading_heading1",
                },
                {
                  model: "heading2",
                  view: "h2",
                  title: "Heading 2",
                  class: "ck-heading_heading2",
                },
                {
                  model: "heading3",
                  view: "h3",
                  title: "Heading 3",
                  class: "ck-heading_heading3",
                },
                {
                  model: "heading4",
                  view: "h4",
                  title: "Heading 4",
                  class: "ck-heading_heading4",
                },
              ],
            },
            image: {
              toolbar: [
                "imageTextAlternative",
                "imageStyle:inline",
                "imageStyle:block",
                "imageStyle:side",
                "linkImage",
              ],
            },
            table: {
              contentToolbar: [
                "tableColumn",
                "tableRow",
                "mergeTableCells",
                "tableProperties",
                "tableCellProperties",
              ],
            },
            codeBlock: {
              languages: [
                { language: "plaintext", label: "Plain text" },
                { language: "javascript", label: "JavaScript" },
                { language: "typescript", label: "TypeScript" },
                { language: "java", label: "Java" },
                { language: "python", label: "Python" },
                { language: "html", label: "HTML" },
                { language: "css", label: "CSS" },
                { language: "sql", label: "SQL" },
                { language: "bash", label: "Bash" },
                { language: "json", label: "JSON" },
              ],
            },
            htmlSupport: {
              allow: [
                { name: /.*/, attributes: true, classes: true, styles: true },
              ],
            },
          })
            .then(function (editor) {
              const form = textarea.closest("form");
              if (form) {
                form.addEventListener("submit", function () {
                  textarea.value = editor.getData();
                });
              }
            })
            .catch(function (err) {
              console.error("CKEditor [" + textareaId + "] init error:", err);
            });
        })();
      </script>
    </th:block>

    <th:block th:fragment="image-picker-js">
      <script>
        "use strict";

        (function () {
          var _activeInputId = null;
          var _activeModalId = null;
          var _selectedUrl = "";

          window.openMediaPicker = function (modalId, targetInputId) {
            _activeInputId = targetInputId;
            _activeModalId = modalId;

            var input = document.getElementById(targetInputId);
            _selectedUrl = input ? input.value : "";

            _showModal(modalId);
            loadPickerPage(0);
          };

          window.loadPickerPage = function (page) {
            var grid = document.getElementById("mediaPickerGrid");
            var spinner = document.getElementById("mediaPickerSpinner");
            if (!grid) return;

            if (spinner) spinner.classList.remove("hidden");

            fetch("/admin/media/picker?page=" + page + "&size=24")
              .then(function (res) {
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.text();
              })
              .then(function (html) {
                grid.innerHTML = html;
                _highlightSelected();
              })
              .catch(function (err) {
                grid.innerHTML =
                  '<p class="col-span-full text-center text-sm text-red-500 py-10">' +
                  "Failed to load media. Please try again." +
                  "</p>";
                console.error("[MediaPicker] load error:", err);
              })
              .finally(function () {
                if (spinner) spinner.classList.add("hidden");
              });
          };

          window.selectPickerImage = function (buttonEl) {
            var url = buttonEl.dataset.url;
            var name = buttonEl.dataset.name;
            if (!url || !_activeInputId) return;

            var input = document.getElementById(_activeInputId);
            if (input) input.value = url;

            _updatePreview(_activeInputId, url, name);

            if (_activeModalId) _hideModal(_activeModalId);
          };

          window.clearPickerField = function (inputId) {
            var input = document.getElementById(inputId);
            if (input) input.value = "";
            _updatePreview(inputId, "", "");
          };

          function _updatePreview(inputId, url, name) {
            var filled = document.getElementById(inputId + "Filled");
            var empty = document.getElementById(inputId + "Empty");
            var img = document.getElementById(inputId + "Img");
            var nameEl = document.getElementById(inputId + "Name");
            var hasUrl = Boolean(url);

            if (filled) filled.classList.toggle("hidden", !hasUrl);
            if (empty) empty.classList.toggle("hidden", hasUrl);
            if (img) img.src = hasUrl ? url : "";
            if (nameEl)
              nameEl.textContent = hasUrl ? name || url.split("/").pop() : "";
          }

          function _highlightSelected() {
            if (!_selectedUrl) return;
            var grid = document.getElementById("mediaPickerGrid");
            if (!grid) return;

            grid.querySelectorAll(".picker-item").forEach(function (btn) {
              var selected = btn.dataset.url === _selectedUrl;
              btn.classList.toggle("border-accent", selected);
              btn.classList.toggle("border-transparent", !selected);
              var check = btn.querySelector(".picker-check");
              if (check) check.style.opacity = selected ? "1" : "0";
            });
          }
        })();
      </script>
    </th:block>
  </body>
</html>
