<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="modal-confirm(modalId, icon, iconBgClass, iconTextClass, title, bodyText, noteText, confirmLabel, confirmBtnClass)"
      th:id="${modalId}"
      class="fixed inset-0 z-50 hidden items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
      th:attr="aria-labelledby=${modalId + 'Title'}"
    >
      <div
        class="absolute inset-0 bg-black/50 backdrop-blur-sm"
        th:attr="onclick='closeConfirmModal(\'' + ${modalId} + '\')'"
      ></div>

      <div
        class="relative w-full max-w-sm bg-light-bg-primary dark:bg-dark-bg-primary rounded-2xl shadow-2xl border border-light-border dark:border-dark-border overflow-hidden transition-colors duration-300"
      >
        <div
          class="flex items-center justify-between px-6 py-4 border-b border-light-border dark:border-dark-border transition-colors duration-300"
        >
          <div class="flex items-center gap-3">
            <div
              th:class="'w-8 h-8 rounded-lg flex items-center justify-center ' + ${iconBgClass}"
            >
              <ion-icon
                th:name="${icon}"
                th:class="'text-lg ' + ${iconTextClass}"
              ></ion-icon>
            </div>
            <h2
              th:id="${modalId + 'Title'}"
              class="text-base font-semibold text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
              th:text="${title}"
            >
              Confirm
            </h2>
          </div>
          <button
            type="button"
            th:attr="onclick='closeConfirmModal(\'' + ${modalId} + '\')'"
            class="w-8 h-8 flex items-center justify-center rounded-lg text-light-fg-tertiary dark:text-dark-fg-tertiary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-all duration-200"
            aria-label="Close"
          >
            <ion-icon name="close-outline" class="text-xl"></ion-icon>
          </button>
        </div>

        <div class="px-6 py-5 space-y-3">
          <p
            class="text-sm text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
            th:text="${bodyText}"
          >
            Are you sure?
          </p>

          <div
            class="flex items-center gap-2.5 px-3 py-2.5 bg-light-action-secondary dark:bg-dark-action-secondary rounded-lg transition-colors duration-300"
          >
            <ion-icon
              th:name="${icon}"
              class="text-light-fg-tertiary dark:text-dark-fg-tertiary text-lg flex-shrink-0"
            ></ion-icon>
            <span
              th:id="${modalId + 'ItemName'}"
              class="text-sm font-medium text-light-fg-primary dark:text-dark-fg-primary truncate transition-colors duration-300"
              >item name</span
            >
          </div>

          <p
            th:if="${noteText}"
            class="text-xs text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300"
            th:text="${noteText}"
          ></p>
        </div>

        <div
          class="flex items-center justify-end gap-3 px-6 py-4 border-t border-light-border dark:border-dark-border transition-colors duration-300"
        >
          <button
            type="button"
            th:attr="onclick='closeConfirmModal(\'' + ${modalId} + '\')'"
            class="px-4 py-2 text-sm font-medium rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary bg-light-action-secondary dark:bg-dark-action-secondary hover:bg-light-action-primary dark:hover:bg-dark-action-primary transition-colors duration-200"
          >
            Cancel
          </button>

          <form th:id="${modalId + 'Form'}" method="post">
            <button
              type="submit"
              th:class="'inline-flex items-center gap-2 px-5 py-2
                         text-sm font-semibold rounded-lg
                         transition-colors duration-200 ' + ${confirmBtnClass}"
            >
              <ion-icon th:name="${icon}" class="text-base"></ion-icon>
              <span th:text="${confirmLabel}">Confirm</span>
            </button>
          </form>
        </div>
      </div>
    </div>

    <div
      th:fragment="modal-upload(modalId, uploadUrl, acceptTypes, maxSizeMb, dropHint)"
      th:id="${modalId}"
      class="fixed inset-0 z-50 hidden items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
      th:attr="aria-labelledby=${modalId + 'Title'}"
    >
      <div
        class="absolute inset-0 bg-black/50 backdrop-blur-sm"
        th:attr="onclick='closeUploadModal(\'' + ${modalId} + '\')'"
      ></div>

      <div
        class="relative w-full max-w-lg bg-light-bg-primary dark:bg-dark-bg-primary rounded-2xl shadow-2xl border border-light-border dark:border-dark-border overflow-hidden transition-colors duration-300"
      >
        <div
          class="flex items-center justify-between px-6 py-4 border-b border-light-border dark:border-dark-border transition-colors duration-300"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-lg bg-accent/10 flex items-center justify-center"
            >
              <ion-icon
                name="cloud-upload-outline"
                class="text-accent text-lg"
              ></ion-icon>
            </div>
            <h2
              th:id="${modalId + 'Title'}"
              class="text-base font-semibold text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
            >
              Upload Files
            </h2>
          </div>
          <button
            type="button"
            th:attr="onclick='closeUploadModal(\'' + ${modalId} + '\')'"
            class="w-8 h-8 flex items-center justify-center rounded-lg text-light-fg-tertiary dark:text-dark-fg-tertiary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-all duration-200"
            aria-label="Close"
          >
            <ion-icon name="close-outline" class="text-xl"></ion-icon>
          </button>
        </div>

        <form
          th:action="${uploadUrl}"
          method="post"
          enctype="multipart/form-data"
          th:id="${modalId + 'Form'}"
          class="p-6 space-y-5"
          th:attr="data-modal-id=${modalId}, data-max-mb=${maxSizeMb}"
          onsubmit="return validateUploadForm(this);"
        >
          <div
            th:id="${modalId + 'DropZone'}"
            th:attr="onclick='document.getElementById(\'' + ${modalId} + 'FileInput\').click()'"
            class="relative flex flex-col items-center justify-center gap-3 py-10 px-6 border-2 border-dashed border-light-border dark:border-dark-border rounded-xl cursor-pointer hover:border-accent hover:bg-accent/5 transition-all duration-200 group"
          >
            <div
              class="w-12 h-12 rounded-xl bg-light-action-secondary dark:bg-dark-action-secondary group-hover:bg-accent/10 flex items-center justify-center transition-colors duration-200"
            >
              <ion-icon
                name="cloud-upload-outline"
                class="text-2xl text-light-fg-tertiary dark:text-dark-fg-tertiary group-hover:text-accent transition-colors duration-200"
              ></ion-icon>
            </div>
            <div class="text-center">
              <p
                class="text-sm font-medium text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
              >
                Drag &amp; drop files here
              </p>
              <p
                class="text-xs text-light-fg-tertiary dark:text-dark-fg-tertiary mt-1 transition-colors duration-300"
                th:text="${dropHint}"
              >
                Supported file types
              </p>
            </div>

            <input
              type="file"
              name="files"
              th:id="${modalId + 'FileInput'}"
              multiple
              th:attr="
                accept=${acceptTypes},
                data-modal-id=${modalId},
                data-max-mb=${maxSizeMb}
              "
              class="sr-only"
              onchange="handleFileSelect(this)"
            />
          </div>

          <ul
            th:id="${modalId + 'FileList'}"
            class="hidden space-y-2 max-h-48 overflow-y-auto"
          ></ul>

          <div class="flex items-center justify-end gap-3 pt-1">
            <button
              type="button"
              th:attr="onclick='closeUploadModal(\'' + ${modalId} + '\')'"
              class="px-4 py-2 text-sm font-medium rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary bg-light-action-secondary dark:bg-dark-action-secondary hover:bg-light-action-primary dark:hover:bg-dark-action-primary transition-colors duration-200"
            >
              Cancel
            </button>
            <button
              type="submit"
              th:id="${modalId + 'SubmitBtn'}"
              disabled
              class="inline-flex items-center gap-2 px-5 py-2 text-sm font-semibold rounded-lg bg-accent text-white hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200"
            >
              <ion-icon
                name="cloud-upload-outline"
                class="text-base"
              ></ion-icon>
              Upload
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      th:fragment="modal-media-picker(modalId)"
      th:id="${modalId}"
      class="fixed inset-0 z-50 hidden items-center justify-center p-4"
      role="dialog"
      aria-modal="true"
      th:attr="aria-labelledby=${modalId + 'Title'}"
    >
      <div
        class="absolute inset-0 bg-black/50 backdrop-blur-sm"
        th:attr="onclick='_hideModal(\'' + ${modalId} + '\')'"
      ></div>

      <div
        class="relative w-full max-w-4xl max-h-[85vh] flex flex-col bg-light-bg-primary dark:bg-dark-bg-primary rounded-2xl shadow-2xl border border-light-border dark:border-dark-border overflow-hidden transition-colors duration-300"
      >
        <div
          class="flex items-center justify-between px-6 py-4 flex-shrink-0 border-b border-light-border dark:border-dark-border transition-colors duration-300"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-lg bg-accent/10 flex items-center justify-center"
            >
              <ion-icon
                name="images-outline"
                class="text-accent text-lg"
              ></ion-icon>
            </div>
            <h2
              th:id="${modalId + 'Title'}"
              class="text-base font-semibold text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
            >
              Choose Image
            </h2>
          </div>

          <div class="flex items-center gap-2">
            <a
              href="/admin/media"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-light-fg-secondary dark:text-dark-fg-secondary border border-light-border dark:border-dark-border hover:border-accent hover:text-accent transition-all duration-200"
            >
              <ion-icon name="open-outline" class="text-sm"></ion-icon>
              Manage Media
            </a>

            <button
              type="button"
              th:attr="onclick='_hideModal(\'' + ${modalId} + '\')'"
              class="w-8 h-8 flex items-center justify-center rounded-lg text-light-fg-tertiary dark:text-dark-fg-tertiary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent transition-all duration-200"
              aria-label="Close"
            >
              <ion-icon name="close-outline" class="text-xl"></ion-icon>
            </button>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 min-h-0">
          <div
            id="mediaPickerSpinner"
            class="hidden flex-col items-center justify-center py-16 gap-3 text-light-fg-tertiary dark:text-dark-fg-tertiary"
          >
            <ion-icon
              name="sync-outline"
              class="text-4xl animate-spin"
            ></ion-icon>
            <p class="text-sm">Loading images…</p>
          </div>

          <div
            id="mediaPickerGrid"
            class="transition-opacity duration-200"
          ></div>
        </div>

        <div
          class="flex items-center justify-between px-6 py-3 flex-shrink-0 border-t border-light-border dark:border-dark-border bg-light-action-secondary dark:bg-dark-action-secondary transition-colors duration-300"
        >
          <p class="text-xs text-light-fg-tertiary dark:text-dark-fg-tertiary">
            Click an image to select it
          </p>
          <button
            type="button"
            th:attr="onclick='_hideModal(\'' + ${modalId} + '\')'"
            class="px-4 py-2 text-sm font-medium rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-primary dark:hover:bg-dark-action-primary transition-colors duration-200"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <th:block th:fragment="modal-js">
      <script th:inline="javascript">
        "use strict";

        function _showModal(id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.classList.remove("hidden");
          el.classList.add("flex");
          document.body.classList.add("overflow-hidden");
        }

        function _hideModal(id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.classList.add("hidden");
          el.classList.remove("flex");
          document.body.classList.remove("overflow-hidden");
        }

        function openConfirmModal(modalId, formAction, itemName) {
          var form = document.getElementById(modalId + "Form");
          var nameSpan = document.getElementById(modalId + "ItemName");
          if (form) form.action = formAction;
          if (nameSpan) nameSpan.textContent = itemName || "";
          _showModal(modalId);
        }

        function closeConfirmModal(modalId) {
          _hideModal(modalId);
        }

        function openUploadModal(modalId) {
          _showModal(modalId);
        }

        function closeUploadModal(modalId) {
          _hideModal(modalId);
          _resetUploadModal(modalId);
        }

        function _resetUploadModal(modalId) {
          var input = document.getElementById(modalId + "FileInput");
          var list = document.getElementById(modalId + "FileList");
          var btn = document.getElementById(modalId + "SubmitBtn");
          if (input) input.value = "";
          if (list) {
            list.innerHTML = "";
            list.classList.add("hidden");
          }
          if (btn) btn.disabled = true;
        }

        function handleFileSelect(inputEl) {
          var modalId = inputEl.dataset.modalId;
          var maxMb = parseFloat(inputEl.dataset.maxMb) || 50;
          var files = inputEl.files;
          var list = document.getElementById(modalId + "FileList");
          var btn = document.getElementById(modalId + "SubmitBtn");

          if (!list || !files || files.length === 0) return;

          list.innerHTML = "";
          list.classList.remove("hidden");

          var hasOversized = false;

          Array.prototype.forEach.call(files, function (file) {
            var oversized = file.size > maxMb * 1024 * 1024;
            if (oversized) hasOversized = true;

            var size =
              file.size >= 1048576
                ? (file.size / 1048576).toFixed(1) + " MB"
                : file.size >= 1024
                  ? Math.round(file.size / 1024) + " KB"
                  : file.size + " B";

            var icon = file.type.startsWith("image/")
              ? "image-outline"
              : "document-outline";

            var li = document.createElement("li");
            li.className = [
              "flex items-center gap-3 px-3 py-2 rounded-lg",
              oversized
                ? "bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800"
                : "bg-light-action-secondary dark:bg-dark-action-secondary",
              "transition-colors duration-300",
            ].join(" ");

            li.innerHTML =
              '<ion-icon name="' +
              icon +
              '" class="text-lg text-light-fg-tertiary dark:text-dark-fg-tertiary flex-shrink-0"></ion-icon>' +
              '<span class="flex-1 text-sm truncate ' +
              (oversized
                ? "text-red-600 dark:text-red-400"
                : "text-light-fg-primary dark:text-dark-fg-primary") +
              '">' +
              _escapeHtml(file.name) +
              "</span>" +
              '<span class="text-xs flex-shrink-0 ' +
              (oversized
                ? "text-red-500 font-semibold"
                : "text-light-fg-tertiary dark:text-dark-fg-tertiary") +
              '">' +
              size +
              (oversized ? " ✕" : "") +
              "</span>";

            list.appendChild(li);
          });

          if (btn) btn.disabled = hasOversized;
        }

        function validateUploadForm(form) {
          var maxMb = parseFloat(form.dataset.maxMb) || 50;
          var input = form.querySelector("input[type='file']");
          if (!input || !input.files) return true;

          var oversized = Array.prototype.some.call(input.files, function (f) {
            return f.size > maxMb * 1024 * 1024;
          });

          if (oversized) {
            alert(
              "One or more files exceed the " +
                maxMb +
                " MB limit. Please remove them and try again.",
            );
            return false;
          }
          return true;
        }

        function copyToClipboard(text, triggerEl) {
          if (!navigator.clipboard) return;
          navigator.clipboard.writeText(text).then(function () {
            if (!triggerEl) return;
            var icon = triggerEl.querySelector("ion-icon");
            if (!icon) return;
            var original = icon.getAttribute("name");
            icon.setAttribute("name", "checkmark-outline");
            setTimeout(function () {
              icon.setAttribute("name", original);
            }, 1500);
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          document
            .querySelectorAll("[id$='DropZone']")
            .forEach(function (zone) {
              var modalId = zone.id.replace("DropZone", "");
              var input = document.getElementById(modalId + "FileInput");
              if (!input) return;

              zone.addEventListener("dragover", function (e) {
                e.preventDefault();
                zone.classList.add("border-accent", "bg-accent/5");
              });
              zone.addEventListener("dragleave", function () {
                zone.classList.remove("border-accent", "bg-accent/5");
              });
              zone.addEventListener("drop", function (e) {
                e.preventDefault();
                zone.classList.remove("border-accent", "bg-accent/5");
                var dt = e.dataTransfer;
                if (dt && dt.files.length > 0) {
                  input.files = dt.files;
                  handleFileSelect(input);
                }
              });
            });
        });

        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;

          document
            .querySelectorAll("[role='dialog'].flex")
            .forEach(function (el) {
              el.classList.add("hidden");
              el.classList.remove("flex");
            });
          document.body.classList.remove("overflow-hidden");
        });

        function _escapeHtml(str) {
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }
      </script>
    </th:block>
  </body>
</html>
