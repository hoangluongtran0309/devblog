<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="alert(type, message)"
      th:if="${message}"
      th:class="'alert-dismissible flex items-start gap-3 px-4 py-3 rounded-xl border text-sm font-medium transition-colors duration-300 ' +
     (${type} == 'success' ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800 text-green-800 dark:text-green-300' :
     (${type} == 'error' ? 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800 text-red-800 dark:text-red-300' :
     (${type} == 'warning' ? 'bg-yellow-50 dark:bg-yellow-900/20 border-yellow-200 dark:border-yellow-800 text-yellow-800 dark:text-yellow-300' :
     'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 text-blue-800 dark:text-blue-300')))"
    >
      <ion-icon
        th:name="${type} == 'success' ? 'checkmark-circle-outline' :
                 (${type} == 'error' ? 'close-circle-outline' :
                 (${type} == 'warning' ? 'warning-outline' :
                 'information-circle-outline'))"
        class="text-xl flex-shrink-0 mt-0.5"
      >
      </ion-icon>

      <span class="flex-1" th:text="${message}">Alert message</span>

      <button
        type="button"
        onclick="this.closest('.alert-dismissible').remove()"
        class="flex-shrink-0 ml-auto -mr-1 opacity-60 hover:opacity-100 transition-opacity"
        aria-label="Dismiss"
      >
        <ion-icon name="close-outline" class="text-lg"></ion-icon>
      </button>
    </div>
  </body>
</html>
