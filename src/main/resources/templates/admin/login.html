<!doctype html>
<html
  th:lang="|${#locale.language}-${#locale.country}|"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - DevBlog</title>

    <link
      rel="shortcut icon"
      th:href="@{/icons/favicon.ico}"
      type="image/x-icon"
    />

    <link th:href="@{/css/application.css}" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-light-bg-secondary dark:bg-dark-bg-secondary text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
  >
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-md">
        <div
          class="bg-light-bg-primary dark:bg-dark-bg-primary rounded-2xl shadow-xl p-8 transition-colors duration-300"
        >
          <div class="text-center mb-8">
            <div class="flex justify-center">
              <a th:href="@{/}">
                <img
                  th:src="@{/svg/logo-light.svg}"
                  width="150"
                  height="40"
                  class="logo-light dark:hidden"
                />
                <img
                  th:src="@{/svg/logo-dark.svg}"
                  width="150"
                  height="40"
                  class="logo-dark hidden dark:block"
                />
              </a>
            </div>
            <h1
              class="text-3xl font-bold text-accent mb-2 transition-colors duration-300"
            >
              Admin Login
            </h1>
            <p
              class="text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
            >
              Log in to manage DevBlog
            </p>
          </div>

          <form
            th:action="@{/admin/login}"
            method="post"
            id="loginForm"
            class="space-y-6 transition-colors duration-300"
            novalidate
          >
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />

            <div
              th:replace="~{admin/fragments/fields :: text-field(
              id='username',
              name='username',
              labelKey=null,
              labelDefault='Username',
              icon='person-outline',
              placeholder='admin',
              required=true,
              autocomplete='username',
              value=${username},
              errorField=null,
              extraClasses=_
            )}"
            ></div>

            <div
              th:replace="~{admin/fragments/fields :: password-field(
              id='password',
              name='password',
              labelKey=null,
              labelDefault='Password',
              placeholder='••••••••',
              required=true,
              autocomplete='current-password',
              minlength=null,
              errorField=null,
              extraClasses=_
            )}"
            ></div>

            <div class="flex items-center justify-between">
              <label class="flex items-center cursor-pointer">
                <input
                  type="checkbox"
                  id="rememberMe"
                  name="remember-me"
                  class="w-4 h-4 text-accent bg-light-action-secondary dark:bg-dark-action-secondary border-light-fg-tertiary dark:border-dark-fg-tertiary rounded focus:ring-accent focus:ring-2"
                />
                <span class="ml-2 text-sm">Remember me</span>
              </label>
            </div>

            <button
              type="submit"
              class="w-full px-6 py-3 bg-accent text-white rounded-lg font-semibold hover:bg-opacity-90 transition-all flex items-center justify-center gap-2"
            >
              <ion-icon name="log-in-outline" class="text-xl"></ion-icon>
              <span>Login</span>
            </button>

            <th:block
              th:if="${alertMessage}"
              th:replace="~{admin/fragments/alerts :: alert(type=${alertType}, message=${alertMessage})}"
            >
            </th:block>
          </form>

          <div class="mt-6 flex justify-center">
            <button
              id="themeLoginToggle"
              class="w-12 h-12 flex justify-center items-center bg-light-action-secondary dark:bg-dark-action-secondary text-light-fg-tertiary dark:text-dark-fg-tertiary rounded-full text-2xl hover:bg-accent hover:text-white transition-all"
            >
              <ion-icon name="moon" class="moon hidden dark:block"></ion-icon>
              <ion-icon name="sunny" class="sun dark:hidden"></ion-icon>
            </button>
          </div>
        </div>

        <div class="text-center mt-6">
          <a
            th:href="@{/}"
            class="text-light-fg-secondary dark:text-dark-fg-secondary hover:text-accent transition-colors inline-flex items-center gap-2"
          >
            <ion-icon name="arrow-back-outline"></ion-icon>
            <span>Return to website</span>
          </a>
        </div>
      </div>
    </div>

    <th:block th:replace="~{admin/fragments/fields :: field-js}"></th:block>

    <script th:inline="javascript">
      "use strict";

      const themeLoginToggle = document.getElementById("themeLoginToggle");
      const toggleLoginTheme = () => {
        document.documentElement.classList.toggle("dark");
        const isDark = document.documentElement.classList.contains("dark");
        localStorage.setItem("loginTheme", isDark ? "dark" : "light");
      };

      themeLoginToggle.addEventListener("click", toggleLoginTheme);

      const savedTheme = localStorage.getItem("loginTheme");
      if (savedTheme === "dark") {
        document.documentElement.classList.add("dark");
      }
    </script>

    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
