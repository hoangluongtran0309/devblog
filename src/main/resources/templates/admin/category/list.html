<!doctype html>
<html
  th:lang="|${#locale.language}-${#locale.country}|"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{admin/layout/main}"
>
  <head>
    <title>Categories - Admin Panel</title>
  </head>

  <body>
    <th:block layout:fragment="content">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold">Categories</h2>
          <p
            class="text-sm text-light-fg-secondary dark:text-dark-fg-secondary mt-1 transition-colors duration-300"
          >
            Manage article categories
          </p>
        </div>
        <a
          th:href="@{/admin/categories/new}"
          class="inline-flex items-center gap-2 px-4 py-2.5 bg-accent text-white text-sm font-semibold rounded-lg hover:opacity-90 transition-opacity duration-200"
        >
          <ion-icon name="add-outline" class="text-lg"></ion-icon>
          New Category
        </a>
      </div>

      <div class="mb-6 space-y-3">
        <th:block
          th:replace="~{admin/fragments/alerts :: alert('success',
          ${deletedCategoryName} != null
            ? 'Category &quot;' + ${deletedCategoryName} + '&quot; has been deleted.'
            : null
        )}"
        ></th:block>
      </div>

      <div
        class="bg-light-bg-primary dark:bg-dark-bg-primary rounded-xl shadow-sm border border-light-border dark:border-dark-border overflow-hidden transition-colors duration-300"
      >
        <div
          th:replace="~{admin/fragments/tables :: table-header-bar(${categories}, 'categories')}"
        ></div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr
                class="bg-light-action-secondary dark:bg-dark-action-secondary transition-colors duration-300"
              >
                <th
                  th:replace="~{admin/fragments/tables :: table-th('#', 'w-12')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Name', '')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Slug', 'hidden md:table-cell')}"
                ></th>
                <th
                  th:replace="~{admin/fragments/tables :: table-th('Actions', 'text-right')}"
                ></th>
              </tr>
            </thead>
            <tbody>
              <th:block th:if="${categories.isEmpty()}">
                <tr
                  th:replace="~{admin/fragments/tables :: table-empty-row(
                    4,
                    'folder-outline',
                    'No categories yet',
                    @{/admin/categories/new},
                    'Create your first category'
                  )}"
                ></tr>
              </th:block>

              <tr
                th:each="category, iter : ${categories}"
                class="border-t border-light-border dark:border-dark-border hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary transition-colors duration-200"
              >
                <td
                  class="px-6 py-4 text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300"
                  th:text="${categories.number * categories.size + iter.count}"
                >
                  1
                </td>

                <td class="px-6 py-4">
                  <div class="flex items-center gap-3">
                    <div
                      class="w-9 h-9 rounded-lg bg-accent/10 flex items-center justify-center flex-shrink-0"
                    >
                      <ion-icon
                        th:name="${category.categoryIcon}"
                        class="text-accent text-lg"
                      ></ion-icon>
                    </div>
                    <span
                      class="font-medium text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
                      th:text="${category.categoryName.asString()}"
                      >Category Name</span
                    >
                  </div>
                </td>

                <td class="px-6 py-4 hidden md:table-cell">
                  <code
                    class="px-2 py-1 rounded bg-light-action-secondary dark:bg-dark-action-secondary text-xs text-light-fg-secondary dark:text-dark-fg-secondary font-mono transition-colors duration-300"
                    th:text="${category.categorySlug.asString()}"
                    >category-slug</code
                  >
                </td>

                <td class="px-6 py-4">
                  <div class="flex items-center justify-end gap-2">
                    <a
                      th:replace="~{admin/fragments/tables :: table-action-edit(
                      @{/admin/categories/{id}/update(id=${category.id.asString()})}
                    )}"
                    ></a>
                    <form
                      th:replace="~{admin/fragments/tables :: table-action-delete(
                      @{/admin/categories/{id}/delete(id=${category.id.asString()})},
                      'Are you sure you want to delete this category?'
                    )}"
                    ></form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          th:replace="~{admin/fragments/paginations :: pagination(${categories}, '/admin/categories')}"
        ></div>
      </div>
    </th:block>
  </body>
</html>
