<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{admin/layout/main}"
>
  <head>
    <title>Change Password - Admin Panel</title>
  </head>

  <body>
    <div layout:fragment="content">
      <section class="transition-colors duration-300">
        <h2 class="text-3xl font-bold mb-6 transition-colors duration-300">
          Change Password
        </h2>

        <th:block
          th:if="${alertMessage}"
          th:replace="~{admin/fragments/alerts :: alert(type=${alertType}, message=${alertMessage})}"
        >
        </th:block>

        <div class="max-w-2xl">
          <div
            class="bg-light-bg-primary dark:bg-dark-bg-primary rounded-xl shadow-md p-6 transition-colors duration-300"
          >
            <div
              class="mb-6 p-4 bg-light-action-secondary dark:bg-dark-action-secondary rounded-lg transition-colors duration-300"
            >
              <div class="flex items-center gap-3">
                <div
                  class="w-12 h-12 bg-accent rounded-full flex items-center justify-center text-white font-bold text-lg transition-colors duration-300"
                  th:text="${#strings.substring(#authentication.principal.displayName,0,1)}"
                >
                  HL
                </div>
                <div>
                  <p
                    class="font-semibold transition-colors duration-300"
                    th:text="${#authentication.principal.displayName}"
                  >
                    Hoang Luong Tran
                  </p>
                </div>
              </div>
            </div>

            <form
              th:action="@{/admin/change-password}"
              method="post"
              th:object="${changePasswordForm}"
              id="changePasswordForm"
              class="space-y-6"
              novalidate
            >
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />

              <div
                th:replace="~{admin/fragments/fields :: password-field(
                id='currentPassword',
                name='currentPassword',
                labelKey=null,
                labelDefault='Current Password',
                placeholder=null,
                required=true,
                autocomplete='current-password',
                minlength=null,
                errorField='currentPassword',
                extraClasses=_
              )}"
              ></div>

              <div
                th:replace="~{admin/fragments/fields :: password-field(
                id='newPassword',
                name='newPassword',
                labelKey=null,
                labelDefault='New Password',
                placeholder=null,
                required=true,
                autocomplete='new-password',
                minlength=8,
                errorField='newPassword',
                extraClasses=_
              )}"
              ></div>

              <div
                th:replace="~{admin/fragments/fields :: password-field(
                id='confirmPassword',
                name='confirmPassword',
                labelKey=null,
                labelDefault='Confirm New Password',
                placeholder=null,
                required=true,
                autocomplete='new-password',
                minlength=null,
                errorField='confirmPassword',
                extraClasses=_
              )}"
              ></div>

              <div class="flex gap-4 pt-4">
                <button
                  type="submit"
                  class="px-6 py-3 bg-accent text-white rounded-lg hover:bg-opacity-90 transition-all duration-300 inline-flex items-center gap-2"
                >
                  <ion-icon
                    name="shield-checkmark-outline"
                    class="text-xl"
                  ></ion-icon>
                  <span>Change Password</span>
                </button>
                <a
                  th:href="@{/admin/dashboard}"
                  class="px-6 py-3 bg-light-action-secondary dark:bg-dark-action-secondary text-light-fg-secondary dark:text-dark-fg-secondary rounded-lg hover:bg-opacity-80 transition-all duration-300 inline-flex items-center gap-2"
                >
                  <ion-icon
                    name="arrow-back-outline"
                    class="text-xl"
                  ></ion-icon>
                  <span>Cancel</span>
                </a>
              </div>
            </form>
          </div>
        </div>
      </section>

      <th:block th:replace="~{admin/fragments/fields :: field-js}"></th:block>
    </div>
  </body>
</html>
