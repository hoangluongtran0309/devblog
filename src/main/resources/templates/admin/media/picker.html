<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="picker-grid">
      <div
        th:if="${!pickerPage.isEmpty()}"
        class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3"
      >
        <button
          th:each="image : ${pickerPage.content}"
          type="button"
          th:attr="
            data-url=${image.mediaUrl.asString()},
            data-name=${image.mediaFileName.asString()}
          "
          onclick="selectPickerImage(this)"
          class="picker-item group relative aspect-square rounded-xl overflow-hidden border-2 border-transparent hover:border-accent focus:outline-none focus:border-accent transition-all duration-200"
        >
          <img
            th:src="${image.mediaUrl.asString()}"
            th:alt="${image.mediaFileName.asString()}"
            loading="lazy"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          />

          <div
            class="picker-item-check absolute inset-0 bg-accent/30 flex items-center justify-center opacity-0 transition-opacity duration-200"
          >
            <div
              class="w-7 h-7 rounded-full bg-accent flex items-center justify-center shadow-md"
            >
              <ion-icon
                name="checkmark-outline"
                class="text-white text-base"
              ></ion-icon>
            </div>
          </div>
        </button>
      </div>

      <div
        th:if="${pickerPage.isEmpty()}"
        class="py-16 flex flex-col items-center gap-3 text-light-fg-tertiary dark:text-dark-fg-tertiary"
      >
        <ion-icon name="images-outline" class="text-5xl"></ion-icon>
        <p class="text-sm font-medium">No images uploaded yet</p>
        <a
          href="/admin/media"
          target="_blank"
          class="text-xs text-accent hover:underline"
          >Go to Media Library →</a
        >
      </div>

      <div
        th:if="${pickerPage.totalPages > 1}"
        class="mt-4 flex items-center justify-between gap-4"
      >
        <p class="text-xs text-light-fg-secondary dark:text-dark-fg-secondary">
          <span th:text="${pickerPage.number * pickerPage.size + 1}">1</span
          >–<span
            th:text="${pickerPage.last ? pickerPage.totalElements : (pickerPage.number + 1) * pickerPage.size}"
            >24</span
          >
          of
          <span th:text="${pickerPage.totalElements}">0</span>
        </p>

        <div class="flex items-center gap-1">
          <button
            type="button"
            th:attr="data-picker-page=${pickerPage.number - 1}"
            th:disabled="${pickerPage.first}"
            onclick="loadPickerPage(this.dataset.pickerPage)"
            class="w-8 h-8 flex items-center justify-center rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent disabled:opacity-40 disabled:pointer-events-none transition-all duration-200"
          >
            <ion-icon name="chevron-back-outline" class="text-sm"></ion-icon>
          </button>

          <span
            class="text-xs font-medium text-light-fg-primary dark:text-dark-fg-primary px-2"
            th:text="${pickerPage.number + 1} + ' / ' + ${pickerPage.totalPages}"
            >1 / 3</span
          >

          <button
            type="button"
            th:attr="data-picker-page=${pickerPage.number + 1}"
            th:disabled="${pickerPage.last}"
            onclick="loadPickerPage(this.dataset.pickerPage)"
            class="w-8 h-8 flex items-center justify-center rounded-lg text-light-fg-secondary dark:text-dark-fg-secondary hover:bg-light-action-secondary dark:hover:bg-dark-action-secondary hover:text-accent disabled:opacity-40 disabled:pointer-events-none transition-all duration-200"
          >
            <ion-icon name="chevron-forward-outline" class="text-sm"></ion-icon>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
