<!doctype html>
<html
  th:lang="|${#locale.language}-${#locale.country}|"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{admin/layout/main}"
>
  <head>
    <title>Media - Admin Panel</title>
  </head>

  <body>
    <th:block layout:fragment="content">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-2xl font-bold">Media Library</h2>
          <p
            class="text-sm text-light-fg-secondary dark:text-dark-fg-secondary mt-1 transition-colors duration-300"
          >
            Manage uploaded images and videos
          </p>
        </div>

        <button
          type="button"
          onclick="openUploadModal('uploadModal')"
          class="inline-flex items-center gap-2 px-4 py-2.5 bg-accent text-white text-sm font-semibold rounded-lg hover:opacity-90 transition-opacity duration-200"
        >
          <ion-icon name="cloud-upload-outline" class="text-lg"></ion-icon>
          Upload Files
        </button>
      </div>

      <div class="mb-6 space-y-3">
        <th:block
          th:replace="~{admin/fragments/alerts :: alert('success', ${successMessage})}"
        ></th:block>
        <th:block
          th:replace="~{admin/fragments/alerts :: alert('error', ${errorMessage})}"
        ></th:block>
      </div>

      <div
        class="bg-light-bg-primary dark:bg-dark-bg-primary rounded-xl shadow-sm border border-light-border dark:border-dark-border overflow-hidden transition-colors duration-300"
      >
        <div
          class="px-6 py-4 border-b border-light-border dark:border-dark-border flex items-center justify-between gap-4 flex-wrap transition-colors duration-300"
        >
          <span
            th:replace="~{admin/fragments/grids :: grid-header-bar(${page}, 'files')}"
          ></span>

          <div
            class="flex items-center gap-1 bg-light-action-secondary dark:bg-dark-action-secondary rounded-lg p-1 transition-colors duration-300"
          >
            <a
              th:replace="~{admin/fragments/grids :: grid-filter-tab(
              'All', '/admin/media', ${selectedType == 'all'}
            )}"
            ></a>
            <a
              th:replace="~{admin/fragments/grids :: grid-filter-tab(
              'Images', '/admin/media?type=image', ${selectedType == 'image'}
            )}"
            ></a>
            <a
              th:replace="~{admin/fragments/grids :: grid-filter-tab(
              'Videos', '/admin/media?type=video', ${selectedType == 'video'}
            )}"
            ></a>
          </div>
        </div>

        <div class="p-6">
          <div
            class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"
          >
            <th:block th:each="media : ${page.content}">
              <div
                class="group relative bg-light-bg-primary dark:bg-dark-bg-primary border border-light-border dark:border-dark-border rounded-xl overflow-hidden hover:shadow-md hover:border-accent/30 transition-all duration-200"
              >
                <div
                  class="relative aspect-square bg-light-action-secondary dark:bg-dark-action-secondary overflow-hidden"
                >
                  <img
                    th:if="${media.mediaType.name() == 'IMAGE'}"
                    th:src="${media.mediaUrl.asString()}"
                    th:alt="${media.mediaFileName.asString()}"
                    loading="lazy"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                  />

                  <div
                    th:unless="${media.mediaType.name() == 'IMAGE'}"
                    class="w-full h-full flex flex-col items-center justify-center gap-2 text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300"
                  >
                    <ion-icon
                      name="videocam-outline"
                      class="text-4xl"
                    ></ion-icon>
                    <span class="text-xs font-medium uppercase tracking-wide"
                      >Video</span
                    >
                  </div>

                  <span
                    th:text="${media.mediaType.name()}"
                    th:classappend="${media.mediaType.name() == 'IMAGE'} ? 'bg-blue-500/80' : 'bg-purple-500/80'"
                    class="absolute top-2 left-2 px-2 py-0.5 rounded-full text-white text-[10px] font-semibold uppercase tracking-wide backdrop-blur-sm"
                  ></span>

                  <div
                    class="absolute inset-0 bg-black/0 group-hover:bg-black/25 opacity-0 group-hover:opacity-100 flex items-start justify-end gap-1.5 p-2 transition-all duration-200"
                  >
                    <button
                      th:replace="~{admin/fragments/grids :: grid-card-action-copy(${media.mediaUrl.asString()})}"
                    ></button>
                    <a
                      th:replace="~{admin/fragments/grids :: grid-card-action-open(${media.mediaUrl.asString()})}"
                    ></a>
                    <form
                      th:replace="~{admin/fragments/grids :: grid-card-action-delete(
                      @{/admin/media/{id}/delete(id=${media.id.asString()})},
                      'Are you sure you want to delete this media?'
                    )}"
                    ></form>
                  </div>
                </div>

                <div class="px-3 py-2.5">
                  <p
                    class="text-sm font-medium text-light-fg-primary dark:text-dark-fg-primary truncate transition-colors duration-300"
                    th:text="${media.mediaFileName.asString()}"
                    th:title="${media.mediaFileName.asString()}"
                  >
                    filename.jpg
                  </p>
                  <p
                    class="text-xs text-light-fg-tertiary dark:text-dark-fg-tertiary mt-0.5 transition-colors duration-300"
                    th:text="${media.fileSize >= 1048576 ?
                      #numbers.formatDecimal(media.fileSize / 1048576.0, 1, 1) + ' MB' :
                      (media.fileSize >= 1024 ?
                        #numbers.formatDecimal(media.fileSize / 1024.0, 1, 0) + ' KB' :
                        media.fileSize + ' B')}"
                  >
                    0 KB
                  </p>
                </div>
              </div>
            </th:block>

            <th:block th:if="${page.isEmpty()}">
              <div
                th:replace="~{admin/fragments/grids :: grid-empty-state(
                  'images-outline',
                  'No media files yet',
                  'Click Upload Files to get started'
                )}"
              ></div>
            </th:block>
          </div>
        </div>

        <div
          th:replace="~{admin/fragments/paginations :: pagination(
            ${page},
            ${'/admin/media' + (selectedType != 'all' ? '?type=' + selectedType : '')}
          )}"
        ></div>
      </div>
    </th:block>

    <th:block layout:fragment="scripts">
      <div
        th:replace="~{admin/fragments/modals :: modal-upload(
        'uploadModal',
        @{/admin/media/upload},
        'image/jpeg,image/png,image/webp,image/gif,video/mp4,video/quicktime',
        50,
        'JPG, PNG, WEBP, GIF, MP4, MOV — max 50 MB each'
      )}"
      ></div>

      <div
        th:replace="~{admin/fragments/modals :: modal-confirm(
        'confirmModal',
        'trash-outline',
        'bg-red-100 dark:bg-red-500/20',
        'text-red-500',
        'Delete File',
        'Are you sure you want to permanently delete:',
        'This action cannot be undone. The file will also be removed from the storage provider.',
        'Delete',
        'bg-red-500 hover:bg-red-600 text-white'
      )}"
      ></div>

      <th:block th:replace="~{admin/fragments/modals :: modal-js}"></th:block>
    </th:block>
  </body>
</html>
