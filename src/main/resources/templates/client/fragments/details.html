<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="detailHero(backHref, backLabel, title, categoryName, categoryHref, publishedAt, contentLength, imageUrl, imageAlt)"
      class="bg-light-bg-primary dark:bg-dark-bg-primary transition-colors duration-300 pt-10 pb-0"
    >
      <div class="container mx-auto px-4 sm:px-8 lg:px-8 max-w-[1150px]">
        <nav
          class="flex items-center gap-2 text-sm text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300 mb-8"
        >
          <a href="/" class="hover:text-accent transition-colors duration-300"
            >Home</a
          >
          <ion-icon name="chevron-forward-outline" class="text-xs"></ion-icon>
          <a
            th:href="${backHref}"
            th:text="${backLabel}"
            class="hover:text-accent transition-colors duration-300"
          ></a>
          <ion-icon name="chevron-forward-outline" class="text-xs"></ion-icon>
          <span
            th:text="${title}"
            class="text-light-fg-secondary dark:text-dark-fg-secondary truncate max-w-[200px] sm:max-w-xs"
          ></span>
        </nav>

        <div th:if="${categoryName != null}" class="mb-4">
          <a
            th:href="${categoryHref}"
            th:text="${categoryName}"
            class="inline-block px-4 py-1 rounded-full bg-accent text-white text-xs font-semibold uppercase tracking-wide hover:opacity-90 transition-opacity"
          ></a>
        </div>

        <h1
          th:text="${title}"
          class="text-3xl sm:text-4xl lg:text-5xl font-black text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300 mb-5 leading-tight max-w-3xl"
        ></h1>

        <div
          class="flex flex-wrap items-center gap-4 mb-10 text-sm text-light-fg-tertiary dark:text-dark-fg-tertiary transition-colors duration-300"
        >
          <div class="flex items-center gap-1.5">
            <ion-icon
              name="calendar-outline"
              class="text-base text-accent"
            ></ion-icon>
            <time
              th:datetime="${publishedAt}"
              th:text="${#temporals.format(publishedAt, 'MMMM dd, yyyy')}"
            ></time>
          </div>
          <span>·</span>
          <div class="flex items-center gap-1.5">
            <ion-icon
              name="time-outline"
              class="text-base text-accent"
            ></ion-icon>
            <span
              th:text="|${T(java.lang.Math).max(1, contentLength / 1000)} min read|"
            ></span>
          </div>
        </div>
      </div>

      <div class="container mx-auto px-4 sm:px-8 lg:px-8 max-w-[1150px]">
        <div
          class="w-full h-64 sm:h-80 lg:h-[420px] rounded-2xl overflow-hidden"
        >
          <img
            th:src="${imageUrl}"
            th:alt="${imageAlt}"
            class="w-full h-full object-cover"
          />
        </div>
      </div>
    </div>

    <div
      th:fragment="detailContent(summary, htmlContent, tags, tagBaseUrl, backHref, backLabel)"
    >
      <p
        th:text="${summary}"
        class="text-xl text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 leading-relaxed mb-10 font-medium border-l-4 border-accent pl-5 italic"
      ></p>

      <div
        th:utext="${htmlContent}"
        class="prose-article text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300 leading-relaxed [&_h2]:text-2xl [&_h2]:font-bold [&_h2]:mt-10 [&_h2]:mb-4 [&_h2]:text-light-fg-primary [&_h2]:dark:text-dark-fg-primary [&_h3]:text-xl [&_h3]:font-semibold [&_h3]:mt-8 [&_h3]:mb-3 [&_p]:mb-5 [&_p]:leading-relaxed [&_ul]:list-disc [&_ul]:pl-6 [&_ul]:mb-5 [&_ul]:space-y-1 [&_ol]:list-decimal [&_ol]:pl-6 [&_ol]:mb-5 [&_ol]:space-y-1 [&_li]:text-light-fg-secondary [&_li]:dark:text-dark-fg-secondary [&_a]:text-accent [&_a]:underline [&_a]:hover:opacity-80 [&_code]:bg-light-action-secondary [&_code]:dark:bg-dark-action-secondary [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-sm [&_code]:font-mono [&_pre]:bg-light-action-secondary [&_pre]:dark:bg-dark-action-secondary [&_pre]:rounded-xl [&_pre]:p-5 [&_pre]:overflow-x-auto [&_pre]:mb-6 [&_pre]:text-sm [&_blockquote]:border-l-4 [&_blockquote]:border-accent [&_blockquote]:pl-5 [&_blockquote]:italic [&_blockquote]:text-light-fg-secondary [&_blockquote]:dark:text-dark-fg-secondary [&_blockquote]:mb-6 [&_img]:rounded-xl [&_img]:mb-6 [&_img]:w-full [&_img]:object-cover [&_hr]:border-light-action-primary [&_hr]:dark:border-dark-action-primary [&_hr]:my-10 [&_table]:w-full [&_table]:mb-6 [&_table]:text-sm [&_th]:bg-light-action-secondary [&_th]:dark:bg-dark-action-secondary [&_th]:px-4 [&_th]:py-2 [&_th]:text-left [&_th]:font-semibold [&_td]:px-4 [&_td]:py-2 [&_td]:border-b [&_td]:border-light-action-primary [&_td]:dark:border-dark-action-primary"
      ></div>

      <div
        th:if="${tags != null and !tags.isEmpty()}"
        class="mt-12 pt-8 border-t border-light-action-primary dark:border-dark-action-primary transition-colors duration-300"
      >
        <div class="flex flex-wrap items-center gap-3">
          <span
            class="text-sm font-semibold text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
          >
            <ion-icon
              name="pricetags-outline"
              class="align-middle mr-1"
            ></ion-icon
            >Tags:
          </span>
          <a
            th:each="tag : ${tags}"
            th:href="${tagBaseUrl + tag.tagSlug.asString()}"
            th:text="|#${tag.tagName.asString()}|"
            class="text-sm px-4 py-1.5 rounded-full bg-light-action-secondary dark:bg-dark-action-secondary text-light-fg-tertiary dark:text-dark-fg-tertiary hover:bg-accent hover:text-white transition-colors duration-300"
          ></a>
        </div>
      </div>

      <div class="mt-10">
        <a
          th:href="${backHref}"
          class="inline-flex items-center gap-2 px-5 py-2.5 bg-light-action-secondary dark:bg-dark-action-secondary text-light-fg-secondary dark:text-dark-fg-secondary border border-light-action-primary dark:border-dark-action-primary rounded-full hover:border-accent hover:text-accent transition-colors duration-300 text-sm font-medium"
        >
          <ion-icon name="arrow-back-outline"></ion-icon>
          <span th:text="|Back to ${backLabel}|"></span>
        </a>
      </div>
    </div>

    <aside
      th:fragment="detailSidebar(infoTitle, publishedAt, categoryName, categoryHref, tags, tagBaseUrl)"
      class="hidden lg:block self-start lg:sticky lg:top-8 mt-12 lg:mt-0 space-y-8"
    >
      <div
        class="bg-light-bg-primary dark:bg-dark-bg-primary transition-colors duration-300 rounded-xl p-6 shadow-md"
      >
        <h3
          th:text="${infoTitle}"
          class="text-base font-bold text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 mb-4"
        ></h3>
        <ul
          class="space-y-3 text-sm text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
        >
          <li th:if="${categoryName != null}" class="flex items-center gap-2">
            <ion-icon
              name="folder-outline"
              class="text-accent flex-shrink-0"
            ></ion-icon>
            <span>Category:</span>
            <a
              th:href="${categoryHref}"
              th:text="${categoryName}"
              class="text-accent hover:underline font-medium"
            ></a>
          </li>
          <li class="flex items-center gap-2">
            <ion-icon
              name="calendar-outline"
              class="text-accent flex-shrink-0"
            ></ion-icon>
            <span>Published:</span>
            <time
              th:datetime="${publishedAt}"
              th:text="${#temporals.format(publishedAt, 'MMM dd, yyyy')}"
              class="font-medium"
            ></time>
          </li>
        </ul>
      </div>

      <div
        th:if="${tags != null and !tags.isEmpty()}"
        class="bg-light-bg-primary dark:bg-dark-bg-primary transition-colors duration-300 rounded-xl p-6 shadow-md"
      >
        <h3
          class="text-base font-bold text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 mb-4"
        >
          Tags
        </h3>
        <div class="flex flex-wrap gap-2">
          <a
            th:each="tag : ${tags}"
            th:href="${tagBaseUrl + tag.tagSlug.asString()}"
            th:text="|#${tag.tagName.asString()}|"
            class="text-xs px-3 py-1 rounded-full bg-light-action-secondary dark:bg-dark-action-secondary text-light-fg-tertiary dark:text-dark-fg-tertiary hover:bg-accent hover:text-white transition-colors duration-300"
          ></a>
        </div>
      </div>
    </aside>
  </body>
</html>
