<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="sidebar"
      class="aside hidden lg:block self-stretch mt-12 lg:mt-0"
    >
      <div class="topics mb-12">
        <h2
          class="text-2xl font-bold text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 mb-12 text-center leading-snug"
        >
          Topics
        </h2>
        <a
          class="topic-btn flex items-stretch bg-light-bg-primary dark:bg-dark-bg-primary transition-colors duration-300 rounded-xl shadow-md overflow-hidden hover:shadow-lg"
        >
          <div
            class="icon-box text-2xl w-[70px] flex justify-center items-center bg-light-action-primary dark:bg-dark-action-primary text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300"
          >
            <ion-icon name="folder-outline"></ion-icon>
          </div>
          <p
            class="p-4 text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 font-bold"
          >
            Category
          </p>
        </a>
      </div>

      <div class="tags mb-12">
        <h2
          class="text-2xl font-bold text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 mb-12 text-center leading-snug"
        >
          Tags
        </h2>

        <div class="wrapper flex flex-wrap gap-1">
          <button
            class="bg-light-action-primary dark:bg-dark-action-primary text-light-fg-secondary dark:text-dark-fg-secondary py-1 px-2.5 text-xs font-bold rounded-md hover:bg-light-fg-secondary hover:text-light-action-primary dark:hover:bg-dark-fg-secondary dark:hover:text-dark-action-primary transition-colors duration-300"
          >
            #tag
          </button>
        </div>
      </div>

      <div
        class="contact mb-12 bg-light-bg-primary dark:bg-dark-bg-primary transition-colors duration-300 rounded-xl p-10 shadow-md"
      >
        <h2
          class="text-2xl font-bold text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 mb-12 text-center leading-snug"
        >
          Let's Talk
        </h2>

        <div class="wrapper">
          <p
            class="text-light-fg-secondary dark:text-dark-fg-secondary transition-colors duration-300 mb-4"
          >
            Do you want to learn more about how I can help your company overcome
            problems? Let us have a conversation.
          </p>

          <ul class="social-link flex justify-center items-center gap-2.5">
            <li>
              <a
                href="#"
                class="icon-box w-11 h-11 bg-light-action-secondary dark:bg-dark-action-secondary transition-colors duration-300 rounded-full flex justify-center items-center text-2xl text-[#5865f2] hover:bg-accent hover:text-white"
              >
                <ion-icon name="logo-discord"></ion-icon>
              </a>
            </li>
            <li>
              <a
                href="#"
                class="icon-box w-11 h-11 bg-light-action-secondary dark:bg-dark-action-secondary transition-colors duration-300 rounded-full flex justify-center items-center text-2xl text-[#1ca0f1] hover:bg-accent hover:text-white"
              >
                <ion-icon name="logo-twitter"></ion-icon>
              </a>
            </li>
            <li>
              <a
                href="#"
                class="icon-box w-11 h-11 bg-light-action-secondary dark:bg-dark-action-secondary transition-colors duration-300 rounded-full flex justify-center items-center text-2xl text-[#4267b2] hover:bg-accent hover:text-white"
              >
                <ion-icon name="logo-facebook"></ion-icon>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
