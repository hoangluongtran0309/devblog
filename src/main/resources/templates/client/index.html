<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{client/layout/main}"
>
  <head>
    <title>DevBlog - Hoang Luong Tran's Personal Blog</title>
  </head>

  <body>
    <div layout:fragment="content">
      <th:block th:replace="~{client/fragments/hero :: hero}"></th:block>

      <div
        class="bg-light-bg-secondary dark:bg-dark-bg-secondary transition-colors duration-300 py-20"
      >
        <div
          class="container mx-auto px-4 sm:px-8 lg:px-8 max-w-[1150px] lg:grid lg:grid-cols-[5fr_2fr] lg:gap-16"
        >
          <div class="blog">
            <div class="flex items-center justify-between mb-8">
              <div class="flex items-center gap-3">
                <span class="w-1 h-6 rounded-full bg-accent"></span>
                <h2
                  class="text-xl font-bold text-light-fg-primary dark:text-dark-fg-primary transition-colors duration-300"
                >
                  Recent Posts
                </h2>
              </div>
              <a
                href="#"
                class="hidden sm:inline-flex items-center gap-1 text-sm text-accent font-medium hover:gap-2 transition-all duration-200"
              >
                View all
                <ion-icon
                  name="arrow-forward-outline"
                  class="text-sm"
                ></ion-icon>
              </a>
            </div>

            <div class="blog-card-group mb-12"></div>

            <div class="flex justify-center">
              <a
                href="#"
                class="inline-flex items-center gap-2 min-w-[10rem] px-5 py-3 bg-light-fg-secondary dark:bg-dark-fg-secondary text-light-bg-secondary dark:text-dark-bg-secondary rounded-full hover:bg-accent hover:text-white dark:hover:text-white transition-colors duration-300"
              >
                <ion-icon name="grid-outline" class="text-base"></ion-icon>
                <span>Load More</span>
              </a>
            </div>
          </div>

          <th:block th:replace="~{client/fragments/sidebar :: sidebar}"></th:block>
        </div>
      </div>
    </div>
  </body>
</html>
