spring.application.name=DevBlog
server.port=${PORT:8080}
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
devblog.admin.first-name=${ADMIN_FIRST_NAME}
devblog.admin.last-name=${ADMIN_LAST_NAME}
devblog.admin.email=${ADMIN_EMAIL}
devblog.admin.password=${ADMIN_PASSWORD}
devblog.remember-me-key=${REMEMBER_ME_KEY}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}